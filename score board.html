<!DOCTYPE html>
<html>
<head>
<title>Cricket Scoreboard</title>
<style>
    body{
        background-color:whitesmoke;
            text-align: justify;
    }
table {
  border-collapse: collapse;
  width: 100%;
  
}
th {
  background-color: rgb(46, 178, 51);
}
table, th, td {
  border: 1px solid black;

}
fieldset{
    margin: 20%;
}
h2{
    color: rgb(95, 216, 194);
}
tr:nth-child(even){
    background-color: rgb(79, 171, 67);

}


</style>
</head>
<body>
<fieldset>
<h2>Cricket Scoreboard</h2>

<table>
  <tr>
    <th rowspan="2">Team</th>
    <th colspan="3">Matches</th>
    <th rowspan="2">Points</th>
  </tr>
  <tr>
    <th>Played</th>
    <th>Wins</th>
    <th>Losses</th>
  </tr>
  <tr>
    <td>SRH</td>
    <td>12</td>
    <td>10</td>
    <td>2</td>
    <td>20</td>
  </tr>
  <tr>
    <td>CSK</td>
    <td>12</td>
    <td>9</td>
    <td>3</td>
    <td>18</td>
  </tr>
  <tr>
    <td>PBKS</td>
    <td>12</td>
    <td>8</td>
    <td>4</td>
    <td>16</td>
  </tr>
  <tr>
    <td>DC</td>
    <td>12</td>
    <td>7</td>
    <td>5</td>
    <td>14</td>
  </tr>
  <tr>
    <td>MI</td>
    <td>12</td>
    <td>5</td>
    <td>7</td>
    <td>10</td>
  </tr>
  <tr>
    <td>RCB</td>
    <td>12</td>
    <td>2</td>
    <td>10</td>
    <td>4</td>
  </tr>
</table>
</fieldset>
</body>
</html>
