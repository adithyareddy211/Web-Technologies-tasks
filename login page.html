<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <style>
        body{
            background-color: whitesmoke;
            text-align: justify;
            border: 2px;
            border-radius: 10px;
            padding: 10px;
            margin: 20%;
            margin-left: 20%;
            margin-right: 40%;
        }
        h1{
            text-align: center;
            color: rgb(15, 15, 15);
            background-color: rgb(76, 180, 206);
        }
        label{
            font-weight: bold;
            font-size: large;
        }
    </style>
</head>
<body>
    <h1>Login Page</h1>
    <hr>
    <form action="task 2.html">
        <label for="username">Username</label>
        <input type="text" id="username"name="username"required><br><br>
        <label for="password">Password</label>
        <input type="password" id="password"name="password"required><br>
        <input style="background-color: rgb(red, green, blue); margin-top: 20px;"type="submit"value="Login">
    </form>
</body>
</html>
